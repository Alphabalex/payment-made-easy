name: CI

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            laravel: "8.*"
            testbench: "6.*"
          - php: "8.1"
            laravel: "9.*"
            testbench: "7.*"
          - php: "8.1"
            laravel: "10.*"
            testbench: "8.*"
          - php: "8.2"
            laravel: "10.*"
            testbench: "8.*"
          - php: "8.2"
            laravel: "11.*"
            testbench: "9.*"
          - php: "8.2"
            laravel: "12.*"
            testbench: "10.*"
          - php: "8.3"
            laravel: "11.*"
            testbench: "9.*"
          - php: "8.3"
            laravel: "12.*"
            testbench: "10.*"
          - php: "8.3"
            laravel: "13.*"
            testbench: "11.*"
          - php: "8.4"
            laravel: "12.*"
            testbench: "10.*"
          - php: "8.4"
            laravel: "13.*"
            testbench: "11.*"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, openssl, bcmath
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            ${{ runner.os }}-composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction
          composer update --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: ./vendor/bin/phpunit --no-coverage

  lint:
    name: Code style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check syntax (PHP lint)
        run: find src tests -name "*.php" -print0 | xargs -0 php -l
